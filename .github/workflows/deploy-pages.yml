name: Deploy APEX Mockup to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prepare Pages package
        run: |
          mkdir -p dist-site/demo_apex_casapellas
          cp -a dist/. dist-site/demo_apex_casapellas/
          rm -f dist-site/demo_apex_casapellas/CNAME
          printf 'demo.naraconsultores.com\n' > dist-site/CNAME
          cat > dist-site/index.html <<'EOF'
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <meta http-equiv="refresh" content="0; url=/demo_apex_casapellas/" />
              <title>APEX Mockup</title>
              <script>
                window.location.replace('/demo_apex_casapellas/')
              </script>
            </head>
            <body>
              <a href="/demo_apex_casapellas/">Abrir APEX Mockup</a>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
